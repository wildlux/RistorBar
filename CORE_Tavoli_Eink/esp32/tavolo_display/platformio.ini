/**
 * RistoBAR - ESP32 E-Ink Display
 * 
 * Display stato tavolo via WiFi
 * Hardware: ESP32 + display e-paper Waveshare 2.9" (296x128)
 * 
 * Configurazione:
 * - SSID/WiFi: inserisci le tue credenziali
 * - SERVER: indirizzo IP del server Django
 * - SALA_ID, TAVOLO_NUM: identifica questo display
 */

#include <WiFi.h>
#include <HTTPClient.h>
#include <ArduinoJson.h>

// ============ CONFIGURAZIONE WiFi ============
const char* SSID = "TUO_WIFI_SSID";
const char* PASSWORD = "TUO_WIFI_PASSWORD";

// ============ CONFIGURAZIONE SERVER ============
const char* SERVER = "192.168.1.100";  // IP del server Django
const int PORT = 8000;
const char* SALA_ID = "1";
const char* TAVOLO_NUM = "1";

// ============ CONFIGURAZIONE DISPLAY ============
// Usa la libreria Waveshare e-paper:
// https://github.com/waveshare/e-Paper
// Pin ESP32 (modifica secondo il tuo wiring)
#define EINK_CS    15
#define EINK_DC    4
#define EINK_RST   2
#define EINK_BUSY  16

// Se usi GxEPD2:
#include <GxEPD2_BW.h>
#include <Fonts/FreeMonoBold12pt.h>
#include <Fonts/FreeMonoBold24pt.h>

// Display 2.9" B/W (296x128)
GxEPD2_BW<GxEPD2_290, GxEPD2_290::_HEIGHT> display(GxEPD2_290(EINK_CS, EINK_DC, EINK_RST, EINK_BUSY));

// ============ STATO ============
String currentStato = "";
String currentNome = "";
bool hasOrder = false;

void setup() {
    Serial.begin(115200);
    
    // Init display
    display.init(115200);
    display.setFont(&FreeMonoBold12pt);
    display.setRotation(1); // Landscape
    
    // Logo iniziale
    showSplash();
    
    // WiFi
    WiFi.begin(SSID, PASSWORD);
    int attempts = 0;
    while (WiFi.status() != WL_CONNECTED && attempts < 20) {
        delay(500);
        Serial.print(".");
        attempts++;
    }
    
    if (WiFi.status() == WL_CONNECTED) {
        Serial.println("\nWiFi connesso!");
        fetchAndDisplay();
    } else {
        showError("WiFi non connesso");
    }
    
    // Deep sleep tra un refresh e l'altro (risparmio energia)
    // Wakeup ogni 60 secondi
    esp_sleep_enable_timer_wakeup(60 * 1000000);
}

void loop() {
    // Il loop non viene eseguito - usiamo deep sleep
    fetchAndDisplay();
    display.sleep();
    esp_deep_sleep_start();
}

// ============ FETCH DATA ============
void fetchAndDisplay() {
    HTTPClient http;
    
    char url[128];
    sprintf(url, "http://%s:%d/api/esp32/tavolo/%s/%s/", SERVER, PORT, SALA_ID, TAVOLO_NUM);
    
    Serial.println(url);
    http.begin(url);
    http.setTimeout(10000);
    
    int httpCode = http.GET();
    
    if (httpCode == HTTP_CODE_OK) {
        String payload = http.getString();
        Serial.println(payload);
        parseAndDisplay(payload);
    } else {
        Serial.printf("HTTP Error: %d\n", httpCode);
        showError("Errore server");
    }
    
    http.end();
}

// ============ PARSE JSON ============
void parseAndDisplay(String json) {
    StaticJsonDocument<512> doc;
    DeserializationError error = deserializeJson(doc, json);
    
    if (error) {
        Serial.print("JSON parse error: ");
        Serial.println(error.c_str());
        showError("Errore JSON");
        return;
    }
    
    String stato = doc["stato_testo"] | "?";
    String nome = doc["prenotato"]["nome"] | "";
    int posti = doc["posti"] | 0;
    bool hasOrder = doc["ordine"] != nullptr;
    
    // Solo aggiorna se cambiato
    if (stato == currentStato && nome == currentNome && hasOrder == this->hasOrder) {
        Serial.println("Nessun cambiamento, non aggiorno display");
        return;
    }
    
    currentStato = stato;
    currentNome = nome;
    this->hasOrder = hasOrder;
    
    // Render
    display.updateWindow(0, 0, display.width(), display.height(), false);
    display.fillScreen(GxEPD_WHITE);
    
    // Header - Numero tavolo
    display.setFont(&FreeMonoBold24pt);
    display.setCursor(10, 30);
    display.print("Tavolo ");
    display.println(TAVOLO_NUM);
    
    // Stato (colore)
    display.setFont(&FreeMonoBold12pt);
    display.setCursor(10, 55);
    display.print("Stato: ");
    
    if (stato == "LIBERO") display.setTextColor(GxEPD_BLACK, GxEPD_WHITE);
    else if (stato == "OCCUPATO") display.setTextColor(GxEPD_WHITE, GxEPD_BLACK);
    else display.setTextColor(GxEPD_BLACK, GxEPD_WHITE);
    
    display.println(stato);
    display.setTextColor(GxEPD_BLACK, GxEPD_WHITE);
    
    // Prenotazione
    if (nome.length() > 0) {
        display.setCursor(10, 80);
        display.print("Prenotato: ");
        display.println(nome.substring(0, 18));
        
        int persone = doc["prenotato"]["persone"] | 0;
        display.print("Persone: ");
        display.println(persone);
        
        String ora = doc["prenotato"]["ora"] | "";
        if (ora.length() > 0) {
            display.print("Ore: ");
            display.println(ora);
        }
    }
    
    // Ordine attivo
    if (hasOrder) {
        display.setCursor(10, 110);
        display.println("*** ORDINE ATTIVO ***");
    }
    
    display.display();
}

// ============ SCREEN HELPERS ============
void showSplash() {
    display.fillScreen(GxEPD_WHITE);
    display.setFont(&FreeMonoBold12pt);
    display.setCursor(20, 60);
    display.println("RistoBAR");
    display.setCursor(20, 80);
    display.println("Caricamento...");
    display.display();
}

void showError(String msg) {
    display.fillScreen(GxEPD_WHITE);
    display.setFont(&FreeMonoBold12pt);
    display.setCursor(10, 60);
    display.println("ERRORE");
    display.setCursor(10, 80);
    display.println(msg);
    display.display();
}